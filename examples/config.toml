# Sample herdr-ghq plugin config. Copy to the plugin's config dir:
#   cp examples/config.toml "$(herdr plugin config-dir ghq)/config.toml"
# Every value is optional; the defaults shown here apply when a key is absent.
# The file is intentionally flat — one "key = value" per line, no sections.

# Where Enter opens the highlighted repo: workspace | tab | split | pane.
# (pane = cd the pane you launched the picker from.)
default_target = "workspace"

# Split target geometry (used by the ctrl-s key and default_target = split).
split_direction = "right"   # right | down
split_ratio = "0.5"         # 0.1–0.9

# Workspace / tab label style: repo (basename) | owner-repo | path.
label = "repo"

# Unified switcher sources. The picker blends these with repos.
include_agents = "true"       # running herdr agents (enter = jump to them)
include_workspaces = "true"   # open herdr workspaces (enter = switch to them)

# Box title colour: a [theme.custom] slot name (accent, peach, mauve, teal, …)
# or a literal #rrggbb.
title_color = "peach"

# Preview pane. The command footer is always full-width, so position is purely
# taste: right (side-by-side, default), down, up, or left.
preview = "enabled"              # enabled | disabled
preview_position = "right"       # right | down | up | left
preview_size = "60%"             # preview share of the body (switcher : preview = 4 : 6)
preview_readme = "true"          # include a README excerpt

# Clone flow (ghq get).
clone_source = "clipboard"  # clipboard (seed the prompt) | prompt
open_after_clone = "true"

# Popup background: auto follows the terminal; disabled paints an opaque panel.
transparency = "auto"       # auto | enabled | disabled

# herdr notifications.
notifications = "true"
notification_position = "top-right"  # top-left | top-right | bottom-left | bottom-right
