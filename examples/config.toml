# Sample herdr-ghq plugin config. Copy to the plugin's config dir:
#   cp examples/config.toml "$(herdr plugin config-dir ghq)/config.toml"
# Every value is optional; the defaults shown here apply when a key is absent.
# The file is intentionally flat — one "key = value" per line, no sections.

# Where Enter opens the highlighted repo: workspace | tab | split | pane.
# (pane = cd the pane you launched the picker from.)
default_target = "workspace"

# Split target geometry (used by the ctrl-s key and default_target = split).
split_direction = "right"   # right | down
split_ratio = "0.5"         # 0.1–0.9

# Workspace / tab label style: repo (basename) | owner-repo | path.
label = "repo"

# Unified switcher sources. The picker blends these with repos.
include_agents = "true"       # running herdr agents (enter = jump to them)
include_workspaces = "true"   # open herdr workspaces (enter = switch to them)

# Resting list order (no query). Cycle live with alt-s; Tab narrows to a group.
sort = "recent"               # recent (latest opened) | name | kind

# Which mode the picker opens in. Normal mode is always one Esc away either way;
# this only sets the start. insert = type-to-filter (default); normal = Vim-first
# (bare hjkl/gg/G move, i or / to filter, ␣ leads the manage verbs).
keymode = "insert"            # insert | normal

# Box title colour: a [theme.custom] slot name (accent, peach, mauve, teal, …)
# or a literal #rrggbb.
title_color = "peach"

# Preview pane. The command footer is always full-width, so position is purely
# taste: right (side-by-side, default), down, up, or left.
preview = "enabled"              # enabled | disabled
preview_position = "right"       # right | down | up | left
preview_size = "60%"             # preview share of the body (switcher : preview = 4 : 6)
preview_readme = "true"          # include a README excerpt

# Clone flow (ghq get).
clone_source = "clipboard"  # clipboard (seed the prompt) | prompt
open_after_clone = "true"

# Popup background: auto follows the terminal; disabled paints an opaque panel.
transparency = "auto"       # auto | enabled | disabled

# Git menu (^g in Insert, ␣g in Normal, or the ghq.git action on prefix+g). Reviews
# run in hunk (brew install hunk); staging opens lazygit. Leave base_branch blank to
# auto-detect (main | master | origin/main | origin/master); set it to pin a base for
# "review branch", e.g. "develop".
base_branch = ""
# Extra rows for the git menu live in a sibling file, menu.conf, one per line:
#   key|icon|label|shell command      (e.g.  p||push|git push)
# Blank lines and #-comments are skipped; a built-in mnemonic wins over a custom one.

# Ask GitHub once a day whether a newer version is tagged, and show it in the
# switcher's command bar. Never installs anything. The check runs in a detached
# process, not in the TUI, and fails silently when offline. Set to "false" for no
# outbound requests at all.
update_check = "true"

# herdr notifications.
notifications = "true"
notification_position = "top-right"  # top-left | top-right | bottom-left | bottom-right
# auto plays a sound that fits the event (done on success, request on failure); or force
# one sound for every toast.
notification_sound = "auto"          # auto | none | done | request

# --- Key bindings (optional) -------------------------------------------------
# Rebind any picker action with `keys.<action> = "chord[,chord…]"`. A chord is
# a key with optional `ctrl-` / `alt-` / `shift-` prefixes: e.g. "ctrl-y",
# "alt-p", "shift-tab", "enter", "esc", "space", "g". Listing chords replaces the
# action's defaults. These apply in both Insert and Normal mode.
#
# Action names:
#   quit help changelog next_group prev_group down up page_down page_up top
#   bottom toggle_preview preview_down preview_up cycle_sort clear_query
#   delete_word insert_mode normal_mode open clone update_plugin settings
#   workspace tab split pane git update remove
# (git opens the git menu overlay; it is ^g in Insert, ␣g in Normal.)
#
# Insert-mode defaults already free ^u/^w for readline (clear line / delete
# word) and put the opens on ^t (tab) / ^v (split) / ^o (cd). Examples:
# keys.tab = "ctrl-y"             # open in a new tab on ^y instead of ^t
# keys.split = "ctrl-x"          # split on ^x instead of ^v
# keys.down = "ctrl-j,ctrl-n"     # multiple chords for one action
