id = "ghq"
name = "Ghq"
version = "0.6.0"
min_herdr_version = "0.7.4"
description = "A unified herdr switcher: fuzzy-jump across running agents, open workspaces, and ghq repositories in one themed picker — open repos in a new workspace/tab/split/pane, plus clone, update, remove, and a git-hub handoff."
platforms = ["macos", "linux"]

[[actions]]
id = "menu"
title = "Project Switcher"
description = "Open the switcher over running agents, open workspaces, and ghq repositories."
contexts = ["global", "pane"]
command = ["bash", "bin/action.sh"]

[[actions]]
id = "get"
title = "Clone Repository"
description = "Clone a repository with ghq get (from clipboard or a prompt), then open it."
contexts = ["global", "pane"]
command = ["bash", "bin/action.sh"]

[[actions]]
id = "settings"
title = "Configure Ghq"
description = "Edit Ghq switcher settings in a themed dashboard."
contexts = ["global", "pane"]
command = ["bash", "bin/action.sh"]

[[actions]]
id = "update-plugin"
title = "Update Ghq"
description = "Install the newest tagged version of this plugin. Refuses to touch a linked checkout."
contexts = ["global", "pane"]
command = ["bash", "bin/action.sh"]

[[actions]]
id = "changelog"
title = "Ghq Changelog"
description = "Read what changed in this plugin, including the version you have installed."
contexts = ["global", "pane"]
command = ["bash", "bin/action.sh"]

# Optional hot-path actions: open the picker with the Enter target forced, so a
# dedicated key always lands the chosen repo in a workspace / tab / split.
[[actions]]
id = "open-workspace"
title = "Open Repo in Workspace"
description = "Pick a repo; Enter opens it in a new workspace."
contexts = ["global", "pane"]
command = ["bash", "bin/action.sh"]

[[actions]]
id = "open-tab"
title = "Open Repo in Tab"
description = "Pick a repo; Enter opens it in a new tab."
contexts = ["global", "pane"]
command = ["bash", "bin/action.sh"]

[[actions]]
id = "open-split"
title = "Open Repo in Split"
description = "Pick a repo; Enter opens it in a split of the current pane."
contexts = ["global", "pane"]
command = ["bash", "bin/action.sh"]

[[panes]]
id = "picker"
title = "󰊢"
placement = "overlay"
command = ["bash", "-c", "exec bash \"$HERDR_PLUGIN_ROOT/bin/picker.sh\""]

[[panes]]
id = "get"
title = "Clone Repository"
placement = "overlay"
command = ["bash", "-c", "exec bash \"$HERDR_PLUGIN_ROOT/bin/get.sh\""]

[[panes]]
id = "settings"
title = "Ghq Settings"
placement = "popup"
width = 88
height = 22
command = ["bash", "-c", "exec bash \"$HERDR_PLUGIN_ROOT/bin/settings.sh\""]

[[panes]]
id = "update-plugin"
title = "Update Ghq"
placement = "overlay"
command = ["bash", "-c", "exec bash \"$HERDR_PLUGIN_ROOT/bin/update-plugin.sh\""]

[[panes]]
id = "changelog"
title = "Ghq Changelog"
placement = "popup"
width = 88
height = 28
command = ["bash", "-c", "exec bash \"$HERDR_PLUGIN_ROOT/bin/changelog.sh\""]
